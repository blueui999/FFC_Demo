<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>節奏振盪折線圖 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-container { height: 300px; position: relative; }
        .line-path { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s ease; }
        .area-path { opacity: 0.1; transition: all 0.3s ease; }
        .data-dot { transition: all 0.2s; cursor: pointer; }
        .data-dot:hover { r: 6; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-8 font-sans">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-xl font-bold text-white">單雙趨勢振盪圖 <span class="text-xs font-normal text-slate-400 ml-2">Rhythm Oscillator</span></h1>
            <p class="text-slate-400 text-sm mt-1">優化邏輯：固定振幅以強調「切換節奏」，避免數值高低干擾判斷。</p>
        </header>

        <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700">
            <div class="chart-container" id="chart-wrapper">
                <svg id="main-chart" width="100%" height="100%" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="grad-odd" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                        </linearGradient>
                        <linearGradient id="grad-even" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#10b981" stop-opacity="0" />
                            <stop offset="100%" stop-color="#10b981" />
                        </linearGradient>
                    </defs>
                    
                    <line x1="0" y1="50%" x2="100%" y2="50%" stroke="#475569" stroke-dasharray="4" />
                    
                    <path id="area-odd" class="area-path" fill="url(#grad-odd)"></path>
                    <path id="area-even" class="area-path" fill="url(#grad-even)"></path>
                    
                    <path id="trend-line" class="line-path" stroke="#94a3b8"></path>
                    
                    <g id="dots-container"></g>
                </svg>
            </div>

            <div id="data-strip" class="mt-4 flex gap-1 overflow-x-auto pb-2 custom-scrollbar">
                </div>
        </div>

        <div class="mt-8 flex gap-3">
            <button onclick="addPoint('單')" class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-lg font-bold">＋ 新增單 (70,XXX)</button>
            <button onclick="addPoint('雙')" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-lg font-bold">＋ 新增雙 (70,XXX)</button>
            <button onclick="reset()" class="text-slate-400 hover:text-white px-4">清除</button>
        </div>
    </div>

    <script>
        let data = [
            { type: '單', val: 70034 }, { type: '單', val: 70048 }, { type: '雙', val: 70020 },
            { type: '單', val: 70062 }, { type: '雙', val: 70018 }, { type: '雙', val: 70028 },
            { type: '單', val: 70056 }, { type: '單', val: 70072 }, { type: '雙', val: 70030 }
        ];

        function addPoint(type) {
            const base = 70000;
            const val = base + Math.floor(Math.random() * 80);
            data.push({ type, val });
            if (data.length > 20) data.shift(); // 保持畫面整潔
            render();
        }

        function reset() { data = []; render(); }

        function render() {
            const svg = document.getElementById('main-chart');
            const container = document.getElementById('chart-wrapper');
            const w = container.clientWidth;
            const h = container.clientHeight;
            const padding = 40;
            
            const step = (w - padding * 2) / (Math.max(data.length - 1, 10));
            const midY = h / 2;
            const amplitude = 80; // 振幅固定

            let dLine = "";
            let dAreaOdd = `M ${padding} ${midY}`;
            let dAreaEven = `M ${padding} ${midY}`;
            
            const dotsContainer = document.getElementById('dots-container');
            const strip = document.getElementById('data-strip');
            dotsContainer.innerHTML = '';
            strip.innerHTML = '';

            data.forEach((item, i) => {
                const x = padding + i * step;
                const y = item.type === '單' ? midY - amplitude : midY + amplitude;
                
                // 更新路徑
                if (i === 0) dLine += `M ${x} ${y}`;
                else dLine += ` L ${x} ${y}`;
                
                dAreaOdd += ` L ${x} ${item.type === '單' ? y : midY}`;
                dAreaEven += ` L ${x} ${item.type === '雙' ? y : midY}`;

                // 畫點
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", "4");
                circle.setAttribute("fill", item.type === '單' ? '#60a5fa' : '#34d399');
                circle.classList.add('data-dot');
                dotsContainer.appendChild(circle);

                // 下方標籤條
                const label = document.createElement('div');
                label.className = `flex-shrink-0 w-12 text-center p-2 rounded-md ${item.type === '單' ? 'bg-blue-900/30 text-blue-300' : 'bg-emerald-900/30 text-emerald-300'}`;
                label.innerHTML = `<div class="text-[10px] opacity-60">${item.type}</div><div class="text-[10px] font-mono">${item.val.toString().slice(-3)}</div>`;
                strip.appendChild(label);
            });

            dAreaOdd += ` L ${padding + (data.length-1)*step} ${midY} Z`;
            dAreaEven += ` L ${padding + (data.length-1)*step} ${midY} Z`;

            document.getElementById('trend-line').setAttribute("d", dLine);
            document.getElementById('area-odd').setAttribute("d", dAreaOdd);
            document.getElementById('area-even').setAttribute("d", dAreaEven);
        }

        window.onresize = render;
        render();
    </script>
</body>
</html>
